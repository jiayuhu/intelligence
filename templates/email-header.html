<tr>
  <td style="padding:0; border-bottom:1px solid #e5e5f0;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:100%; mso-table-lspace:0pt; mso-table-rspace:0pt;">
      <tr>
        <td style="height:4px; background-color:#312e81; font-size:0; line-height:0;">&nbsp;</td>
      </tr>
      <tr>
        <td style="padding:24px 28px 20px 28px; background-color:#f9f8fc;">
          <div style="font-size:12px; font-weight:600; color:#8b5cf6; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px;">AI行业情报</div>
          <div style="font-size:20px; font-weight:700; line-height:1.4; color:#312e81; letter-spacing:-0.01em;">{{subject}}</div>
          <div style="margin-top:8px; font-size:13px; color:#6b7280;">{{subtitle}}</div>
          <div style="margin-top:4px; font-size:13px; color:#9ca3af;">日期：{{reportDate}}</div>
        </td>
      </tr>
    </table>
  </td>
</tr>
