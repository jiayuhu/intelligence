<tr>
  <td style="padding:24px 28px 28px 28px; font-size:15px; background-color:#ffffff;">
    <p style="margin:0 0 16px 0; font-size:15px; line-height:1.7; color:#374151;">{{opening}}</p>
    <p style="margin:0 0 12px 0; font-size:13px; font-weight:600; color:#312e81; letter-spacing:0.02em;">核心摘要</p>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:100%; mso-table-lspace:0pt; mso-table-rspace:0pt;">
      {{highlightsHtml}}
    </table>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:100%; margin:16px 0; mso-table-lspace:0pt; mso-table-rspace:0pt;">
      <tr>
        <td style="padding:14px 16px; background-color:#f9f8fc; border-left:3px solid #8b5cf6;">
          <div style="margin:0 0 4px 0; font-size:12px; font-weight:600; color:#6b7280;">附件与范围</div>
          <div style="margin:0 0 4px 0; font-size:14px; color:#111827;">PDF 附件：{{pdfAttachmentName}}</div>
          <div style="margin:0; font-size:14px; color:#111827;">时间窗口：{{timeWindowHours}} 小时</div>
        </td>
      </tr>
    </table>
    <p style="margin:16px 0 12px 0; padding:14px 16px; background-color:#f9f8fc; border-left:3px solid #312e81; font-size:14px; line-height:1.7; color:#4b5563;">{{closing}}</p>
    <p style="margin:0; font-size:13px; color:#9ca3af;">如需进一步拆分主题或补充追踪，请继续跟进对应情报文件。</p>
  </td>
</tr>
