<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      @page {
        size: A4;
        margin: 16mm 14mm;
      }

      @media print {
        html, body {
          background: #ffffff !important;
        }
        body {
          margin: 0 !important;
          padding: 0 !important;
        }
        tr, td, th {
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body style="margin:0; padding:0; background-color:#f8f7fb; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif; color:#111827; line-height:1.6; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:100%; mso-table-lspace:0pt; mso-table-rspace:0pt;">
      <tr>
        <td align="center" style="padding:20px 12px;">
          <table role="presentation" width="680" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:680px; max-width:680px; background-color:#ffffff; border:1px solid #e5e5f0; mso-table-lspace:0pt; mso-table-rspace:0pt;">
            {{header}}
            {{body}}
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
