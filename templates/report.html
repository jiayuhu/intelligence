<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{{title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        margin: 40px;
        line-height: 1.7;
        color: #1f2937;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      .meta {
        color: #6b7280;
        margin-bottom: 1.5rem;
      }
      .box {
        padding: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #fafafa;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>{{title}}</h1>
    <div class="meta">情报类型：{{categoryName}} | 日期：{{reportDate}}</div>
    <div class="box">{{content}}</div>
  </body>
</html>
