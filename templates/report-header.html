<tr>
  <td style="padding:0; border-bottom:1px solid #e5e5f0;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:100%; mso-table-lspace:0pt; mso-table-rspace:0pt;">
      <tr>
        <td style="height:4px; background-color:#312e81; font-size:0; line-height:0;">&nbsp;</td>
      </tr>
      <tr>
        <td style="padding:28px 28px 24px 28px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse; width:100%; mso-table-lspace:0pt; mso-table-rspace:0pt;">
            <tr>
              <td style="vertical-align:top;">
                <div style="font-size:12px; font-weight:600; color:#8b5cf6; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px;">{{categoryName}}</div>
                <div style="font-size:26px; font-weight:700; line-height:1.3; color:#312e81; letter-spacing:-0.01em;">{{title}}</div>
                <div style="margin-top:6px; font-size:14px; color:#6b7280;">{{subtitle}}</div>
              </td>
              <td style="width:140px; vertical-align:top; text-align:right;">
                <div style="font-size:11px; font-weight:600; color:#9ca3af; letter-spacing:0.05em;">报告日期</div>
                <div style="margin-top:4px; font-size:15px; font-weight:600; color:#312e81;">{{reportDate}}</div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </td>
</tr>
